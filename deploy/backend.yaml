AWSTemplateFormatVersion: '2010-09-09'
Description: WAF Agent — Backend (Cognito + AgentCore). Deploy in ap-northeast-1.

Parameters:
  AgentContainerUri:
    Type: String
    Description: ECR image URI for the WAF Agent (ARM64)
    AllowedPattern: ^[0-9]+\.dkr\.ecr\..+\.amazonaws\.com/.+:.+$
    ConstraintDescription: Must be a valid ECR image URI
  AgentRuntimeName:
    Type: String
    Default: waf_agent
    Description: AgentCore runtime name (letters, digits, underscores only, max 48 chars)
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,47}$

Resources:
  # --- Cognito ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AWS::StackName}-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders: [COGNITO]

  # --- IAM Role for AgentCore Runtime ---
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*
      Policies:
        - PolicyName: AgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: WAF
                Effect: Allow
                Action:
                  - wafv2:GetWebACL
                  - wafv2:ListWebACLs
                  - wafv2:GetLoggingConfiguration
                  - wafv2:ListResourcesForWebACL
                Resource: '*'
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                  - logs:DescribeLogGroups
                Resource: '*'
              - Sid: Athena
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'
              - Sid: S3Read
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: '*'
              - Sid: Glue
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:CreateTable
                  - glue:DeleteTable
                  - glue:CreateDatabase
                Resource: '*'
              - Sid: Bedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*

  # --- AgentCore Runtime ---
  AgentRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: AgentExecutionRole
    Properties:
      AgentRuntimeName: !Ref AgentRuntimeName
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Ref AgentContainerUri
      RoleArn: !GetAtt AgentExecutionRole.Arn
      NetworkConfiguration:
        NetworkMode: PUBLIC
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}/.well-known/openid-configuration
          AllowedAudience:
            - !Ref UserPoolClient
          AllowedClients:
            - !Ref UserPoolClient

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  AgentRuntimeArn:
    Value: !GetAtt AgentRuntime.AgentRuntimeArn
    Description: Frontend must URL-encode this in the invoke path
  AgentEndpoint:
    Value: !Sub https://bedrock-agentcore.${AWS::Region}.amazonaws.com
  ExecutionRoleArn:
    Value: !GetAtt AgentExecutionRole.Arn
