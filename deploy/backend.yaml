AWSTemplateFormatVersion: '2010-09-09'
Description: WAF Agent — Backend (Cognito + AgentCore). Deploy in ap-northeast-1.

Parameters:
  AgentContainerUri:
    Type: String
    Description: ECR image URI for the WAF Agent (ARM64)
    AllowedPattern: ^[0-9]+\.dkr\.ecr\..+\.amazonaws\.com/.+:.+$
    ConstraintDescription: Must be a valid ECR image URI
  AgentRuntimeName:
    Type: String
    Default: waf_agent
    Description: AgentCore runtime name (letters, digits, underscores only, max 48 chars)
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,47}$
  ModelId:
    Type: String
    Default: ""
    Description: "Amazon Bedrock model ID (e.g., anthropic.claude-sonnet-4-6, us.anthropic.claude-sonnet-4-6). Leave empty for region-based default."
  ModelRegion:
    Type: String
    Default: ""
    Description: "Region for Amazon Bedrock model invocation. Leave empty to use stack region."
  MemoryId:
    Type: String
    Default: ""
    Description: "AgentCore Memory resource ID. Leave empty to auto-create. Set to 'none' to disable memory entirely."
  ExistingUserPoolId:
    Type: String
    Default: ""
    Description: "Existing Cognito User Pool ID. Leave empty to auto-create a new pool."
  ExistingClientId:
    Type: String
    Default: ""
    Description: "Existing Cognito User Pool Client ID. Required if ExistingUserPoolId is set."

Conditions:
  HasModelId: !Not [!Equals [!Ref ModelId, ""]]
  HasModelRegion: !Not [!Equals [!Ref ModelRegion, ""]]
  CreateMemory: !Not [!Equals [!Ref MemoryId, "none"]]
  UseExistingMemory: !And
    - !Not [!Equals [!Ref MemoryId, ""]]
    - !Not [!Equals [!Ref MemoryId, "none"]]
  CreateUserPool: !Equals [!Ref ExistingUserPoolId, ""]

Resources:
  # --- Cognito ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Condition: CreateUserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: CreateUserPool
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AWS::StackName}-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders: [COGNITO]

  # --- IAM Role for AgentCore Runtime ---
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*
      Policies:
        - PolicyName: AgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: Waf
                Effect: Allow
                Action:
                  - wafv2:GetWebACL
                  - wafv2:ListWebACLs
                  - wafv2:GetLoggingConfiguration
                  - wafv2:ListResourcesForWebACL
                Resource: '*'
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                  - logs:DescribeLogGroups
                Resource: '*'
              - Sid: Athena
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'
              - Sid: S3Read
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: '*'
              - Sid: Firehose
                Effect: Allow
                Action:
                  - firehose:DescribeDeliveryStream
                Resource: '*'
              - Sid: Glue
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:CreateTable
                  - glue:DeleteTable
                  - glue:CreateDatabase
                Resource: '*'
              - Sid: Bedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Sid: Memory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:RetrieveMemoryRecords
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:CreateSession
                  - bedrock-agentcore:ListSessions
                Resource: '*'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt SessionsTable.Arn

  # --- DynamoDB (session history) ---
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- AgentCore Memory (cross-session persistent memory) ---
  AgentMemory:
    Type: AWS::BedrockAgentCore::Memory
    Condition: CreateMemory
    Properties:
      Name: !Sub "${AgentRuntimeName}_memory"
      EventExpiryDuration: 30
      MemoryStrategies:
        - SemanticMemoryStrategy:
            Name: Facts
            NamespaceTemplates:
              - "/facts/{actorId}/"
        - SummaryMemoryStrategy:
            Name: Summary
            NamespaceTemplates:
              - "/summaries/{actorId}/{sessionId}/"
        - UserPreferenceMemoryStrategy:
            Name: Preferences
            NamespaceTemplates:
              - "/preferences/{actorId}/"

  # --- AgentCore Runtime ---
  AgentRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: AgentExecutionRole
    Properties:
      AgentRuntimeName: !Ref AgentRuntimeName
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Ref AgentContainerUri
      EnvironmentVariables: !If
        - HasModelId
        - WAF_AGENT_MODEL_ID: !Ref ModelId
          WAF_AGENT_MODEL_REGION: !If [HasModelRegion, !Ref ModelRegion, !Ref "AWS::Region"]
          MEMORY_ID: !If [CreateMemory, !If [UseExistingMemory, !Ref MemoryId, !GetAtt AgentMemory.MemoryId], !Ref "AWS::NoValue"]
          SESSIONS_TABLE: !Ref SessionsTable
        - !If
          - CreateMemory
          - MEMORY_ID: !If [UseExistingMemory, !Ref MemoryId, !GetAtt AgentMemory.MemoryId]
            SESSIONS_TABLE: !Ref SessionsTable
          - SESSIONS_TABLE: !Ref SessionsTable
      RoleArn: !GetAtt AgentExecutionRole.Arn
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RequestHeaderConfiguration:
        RequestHeaderAllowlist:
          - "Authorization"
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl: !Sub
            - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}/.well-known/openid-configuration
            - PoolId: !If [CreateUserPool, !Ref UserPool, !Ref ExistingUserPoolId]
          AllowedAudience:
            - !If [CreateUserPool, !Ref UserPoolClient, !Ref ExistingClientId]

Outputs:
  UserPoolId:
    Value: !If [CreateUserPool, !Ref UserPool, !Ref ExistingUserPoolId]
  UserPoolClientId:
    Value: !If [CreateUserPool, !Ref UserPoolClient, !Ref ExistingClientId]
  AgentRuntimeArn:
    Value: !GetAtt AgentRuntime.AgentRuntimeArn
    Description: Frontend must URL-encode this in the invoke path
  AgentEndpoint:
    Value: !Sub https://bedrock-agentcore.${AWS::Region}.amazonaws.com
  ExecutionRoleArn:
    Value: !GetAtt AgentExecutionRole.Arn
  SessionsTableName:
    Value: !Ref SessionsTable
