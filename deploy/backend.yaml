AWSTemplateFormatVersion: '2010-09-09'
Description: WAF Agent — Backend (Cognito + AgentCore). Deploy in ap-northeast-1.

Parameters:
  AgentContainerUri:
    Type: String
    Description: ECR image URI for the WAF Agent (ARM64)
    AllowedPattern: ^[0-9]+\.dkr\.ecr\..+\.amazonaws\.com/.+:.+$
    ConstraintDescription: Must be a valid ECR image URI
  AgentRuntimeName:
    Type: String
    Default: waf_agent
    Description: AgentCore runtime name (letters, digits, underscores only, max 48 chars)
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,47}$
  ModelId:
    Type: String
    Default: ""
    Description: "Amazon Bedrock model ID (e.g., anthropic.claude-sonnet-4-6, us.anthropic.claude-sonnet-4-6). Leave empty for region-based default."
  ModelRegion:
    Type: String
    Default: ""
    Description: "Region for Amazon Bedrock model invocation. Leave empty to use stack region."
  MemoryId:
    Type: String
    Default: ""
    Description: "AgentCore Memory resource ID. Leave empty to auto-create. Set to 'none' to disable memory entirely."
  ExistingUserPoolId:
    Type: String
    Default: ""
    Description: "Existing Cognito User Pool ID. Leave empty to auto-create a new pool."
  ExistingClientId:
    Type: String
    Default: ""
    Description: "Existing Cognito User Pool Client ID. Required if ExistingUserPoolId is set."

Conditions:
  HasModelId: !Not [!Equals [!Ref ModelId, ""]]
  HasModelRegion: !Not [!Equals [!Ref ModelRegion, ""]]
  CreateMemory: !Not [!Equals [!Ref MemoryId, "none"]]
  UseExistingMemory: !And
    - !Not [!Equals [!Ref MemoryId, ""]]
    - !Not [!Equals [!Ref MemoryId, "none"]]
  CreateUserPool: !Equals [!Ref ExistingUserPoolId, ""]

Resources:
  # --- Cognito ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Condition: CreateUserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: CreateUserPool
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AWS::StackName}-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders: [COGNITO]

  # --- IAM Role for AgentCore Runtime ---
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*
      Policies:
        - PolicyName: AgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: Waf
                Effect: Allow
                Action:
                  - wafv2:GetWebACL
                  - wafv2:ListWebACLs
                  - wafv2:GetLoggingConfiguration
                  - wafv2:ListResourcesForWebACL
                Resource: '*'
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                  - logs:DescribeLogGroups
                Resource: '*'
              - Sid: Athena
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'
              - Sid: S3Read
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: '*'
              - Sid: Firehose
                Effect: Allow
                Action:
                  - firehose:DescribeDeliveryStream
                Resource: '*'
              - Sid: Glue
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:CreateTable
                  - glue:DeleteTable
                  - glue:CreateDatabase
                Resource: '*'
              - Sid: Bedrock
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Sid: Memory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:RetrieveMemoryRecords
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:CreateSession
                  - bedrock-agentcore:ListSessions
                Resource: '*'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt SessionsTable.Arn

  # --- DynamoDB (session history) ---
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --- Session API (Lambda + API Gateway) ---
  SessionsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt SessionsTable.Arn

  SessionsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-sessions-api
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SessionsLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref SessionsTable
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: MIT-0
          import json, os, boto3
          TABLE = os.environ['SESSIONS_TABLE']
          ddb = boto3.client('dynamodb')

          def handler(event, context):
              user_id = event.get('requestContext', {}).get('authorizer', {}).get('jwt', {}).get('claims', {}).get('email', '')
              if not user_id:
                  return {'statusCode': 401, 'body': '{"error":"unauthorized"}'}
              method = event.get('routeKey', '')
              sid = event.get('pathParameters', {}).get('sessionId', '') if event.get('pathParameters') else ''

              if method == 'GET /sessions':
                  return _list(user_id)
              elif method == 'GET /sessions/{sessionId}':
                  return _get(user_id, sid)
              elif method == 'DELETE /sessions/{sessionId}':
                  return _delete(user_id, sid)
              return {'statusCode': 404, 'body': '{"error":"not found"}'}

          def _list(user_id):
              resp = ddb.query(TableName=TABLE, KeyConditionExpression='userId = :uid',
                  FilterExpression='contains(sk, :meta)',
                  ExpressionAttributeValues={':uid': {'S': user_id}, ':meta': {'S': '#0000'}},
                  ProjectionExpression='sk, title, createdAt, lastUsed')
              sessions = []
              for item in resp.get('Items', []):
                  sessions.append({'sessionId': item['sk']['S'].rsplit('#', 1)[0],
                      'title': item.get('title', {}).get('S', ''),
                      'createdAt': int(item.get('createdAt', {}).get('N', '0')),
                      'lastUsed': int(item.get('lastUsed', {}).get('N', '0'))})
              sessions.sort(key=lambda s: s['lastUsed'], reverse=True)
              return _json_resp({'sessions': sessions[:20]})

          def _get(user_id, sid):
              if not sid: return _json_resp({'messages': []})
              resp = ddb.query(TableName=TABLE, KeyConditionExpression='userId = :uid AND begins_with(sk, :prefix)',
                  ExpressionAttributeValues={':uid': {'S': user_id}, ':prefix': {'S': f'{sid}#'}})
              messages = []
              for item in resp.get('Items', []):
                  if item['sk']['S'].endswith('#0000'): continue
                  tools = []
                  for t in item.get('tools', {}).get('L', []):
                      tools.append({'name': t.get('M', {}).get('name', {}).get('S', ''), 'status': t.get('M', {}).get('status', {}).get('S', '')})
                  messages.append({'role': item.get('role', {}).get('S', ''), 'content': item.get('content', {}).get('S', ''),
                      'tools': tools, 'ts': int(item.get('ts', {}).get('N', '0'))})
              messages.sort(key=lambda m: m['ts'])
              return _json_resp({'messages': messages})

          def _delete(user_id, sid):
              if not sid: return _json_resp({'ok': False})
              resp = ddb.query(TableName=TABLE, KeyConditionExpression='userId = :uid AND begins_with(sk, :prefix)',
                  ExpressionAttributeValues={':uid': {'S': user_id}, ':prefix': {'S': f'{sid}#'}},
                  ProjectionExpression='userId, sk')
              items = resp.get('Items', [])
              for i in range(0, len(items), 25):
                  batch = items[i:i+25]
                  ddb.batch_write_item(RequestItems={TABLE: [{'DeleteRequest': {'Key': {'userId': it['userId'], 'sk': it['sk']}}} for it in batch]})
              return _json_resp({'ok': True})

          def _json_resp(body):
              return {'statusCode': 200, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps(body)}

  SessionsApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-sessions
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: ['GET', 'DELETE', 'OPTIONS']
        AllowHeaders: ['Authorization', 'Content-Type']

  SessionsApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref SessionsApi
      AuthorizerType: JWT
      IdentitySource: $request.header.Authorization
      Name: CognitoAuth
      JwtConfiguration:
        Audience:
          - !If [CreateUserPool, !Ref UserPoolClient, !Ref ExistingClientId]
        Issuer: !Sub
          - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}
          - PoolId: !If [CreateUserPool, !Ref UserPool, !Ref ExistingUserPoolId]

  SessionsApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref SessionsApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SessionsLambda.Arn
      PayloadFormatVersion: '2.0'

  SessionsRouteList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref SessionsApi
      RouteKey: GET /sessions
      AuthorizationType: JWT
      AuthorizerId: !Ref SessionsApiAuthorizer
      Target: !Sub integrations/${SessionsApiIntegration}

  SessionsRouteGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref SessionsApi
      RouteKey: GET /sessions/{sessionId}
      AuthorizationType: JWT
      AuthorizerId: !Ref SessionsApiAuthorizer
      Target: !Sub integrations/${SessionsApiIntegration}

  SessionsRouteDelete:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref SessionsApi
      RouteKey: DELETE /sessions/{sessionId}
      AuthorizationType: JWT
      AuthorizerId: !Ref SessionsApiAuthorizer
      Target: !Sub integrations/${SessionsApiIntegration}

  SessionsApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref SessionsApi
      StageName: $default
      AutoDeploy: true

  SessionsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SessionsLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SessionsApi}/*

  # --- AgentCore Memory (cross-session persistent memory) ---
  AgentMemory:
    Type: AWS::BedrockAgentCore::Memory
    Condition: CreateMemory
    Properties:
      Name: !Sub "${AgentRuntimeName}_memory"
      EventExpiryDuration: 30
      MemoryStrategies:
        - SemanticMemoryStrategy:
            Name: Facts
            NamespaceTemplates:
              - "/facts/{actorId}/"
        - SummaryMemoryStrategy:
            Name: Summary
            NamespaceTemplates:
              - "/summaries/{actorId}/{sessionId}/"
        - UserPreferenceMemoryStrategy:
            Name: Preferences
            NamespaceTemplates:
              - "/preferences/{actorId}/"

  # --- AgentCore Runtime ---
  AgentRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: AgentExecutionRole
    Properties:
      AgentRuntimeName: !Ref AgentRuntimeName
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Ref AgentContainerUri
      EnvironmentVariables: !If
        - HasModelId
        - WAF_AGENT_MODEL_ID: !Ref ModelId
          WAF_AGENT_MODEL_REGION: !If [HasModelRegion, !Ref ModelRegion, !Ref "AWS::Region"]
          MEMORY_ID: !If [CreateMemory, !If [UseExistingMemory, !Ref MemoryId, !GetAtt AgentMemory.MemoryId], !Ref "AWS::NoValue"]
          SESSIONS_TABLE: !Ref SessionsTable
        - !If
          - CreateMemory
          - MEMORY_ID: !If [UseExistingMemory, !Ref MemoryId, !GetAtt AgentMemory.MemoryId]
            SESSIONS_TABLE: !Ref SessionsTable
          - SESSIONS_TABLE: !Ref SessionsTable
      RoleArn: !GetAtt AgentExecutionRole.Arn
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RequestHeaderConfiguration:
        RequestHeaderAllowlist:
          - "Authorization"
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl: !Sub
            - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}/.well-known/openid-configuration
            - PoolId: !If [CreateUserPool, !Ref UserPool, !Ref ExistingUserPoolId]
          AllowedAudience:
            - !If [CreateUserPool, !Ref UserPoolClient, !Ref ExistingClientId]

Outputs:
  UserPoolId:
    Value: !If [CreateUserPool, !Ref UserPool, !Ref ExistingUserPoolId]
  UserPoolClientId:
    Value: !If [CreateUserPool, !Ref UserPoolClient, !Ref ExistingClientId]
  AgentRuntimeArn:
    Value: !GetAtt AgentRuntime.AgentRuntimeArn
    Description: Frontend must URL-encode this in the invoke path
  AgentEndpoint:
    Value: !Sub https://bedrock-agentcore.${AWS::Region}.amazonaws.com
  ExecutionRoleArn:
    Value: !GetAtt AgentExecutionRole.Arn
  SessionsTableName:
    Value: !Ref SessionsTable
  SessionsApiUrl:
    Value: !GetAtt SessionsApi.ApiEndpoint
    Description: Base URL for session history API
