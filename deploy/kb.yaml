AWSTemplateFormatVersion: '2010-09-09'
Description: WAF Analyst — Knowledge Base (Bedrock KB + S3 Vectors). Deploy in same region as backend.

Parameters:
  AppName:
    Type: String
    Default: waf-agent-kb

Resources:
  # --- S3 Vectors (vector store) ---
  VectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Sub "${AppName}-vectors-${AWS::AccountId}-${AWS::Region}"

  VectorIndex:
    Type: AWS::S3Vectors::Index
    Properties:
      VectorBucketName: !Sub "${AppName}-vectors-${AWS::AccountId}-${AWS::Region}"
      IndexName: !Sub "${AppName}-index"
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine
      # AMAZON_BEDROCK_TEXT (chunk text) and AMAZON_BEDROCK_METADATA (source
      # metadata) grow with chunk size. S3 Vectors caps FILTERABLE metadata at
      # 2 KB/vector; marking these non-filterable exempts them from that cap
      # (they count only against the 40 KB total). Required for large chunks
      # (e.g. MaxTokens 1000) — otherwise ingestion fails with
      # "Filterable metadata must have at most 2048 bytes".
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - AMAZON_BEDROCK_TEXT
          - AMAZON_BEDROCK_METADATA
    DependsOn: VectorBucket

  # --- S3 bucket for source documents ---
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub "${DocumentsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # --- KB service role ---
  KBServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
      Policies:
        - PolicyName: KBServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockEmbedding
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
              - Sid: S3ReadDocs
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub "${DocumentsBucket.Arn}/*"
              - Sid: S3VectorsAccess
                Effect: Allow
                Action:
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:QueryVectors
                  - s3vectors:GetIndex
                Resource: !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/${AppName}-vectors-${AWS::AccountId}-${AWS::Region}/index/${AppName}-index"

  # --- Bedrock Knowledge Base ---
  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: !Sub "${AppName}"
      RoleArn: !GetAtt KBServiceRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
          EmbeddingModelConfiguration:
            BedrockEmbeddingModelConfiguration:
              Dimensions: 1024
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          VectorBucketArn: !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/${AppName}-vectors-${AWS::AccountId}-${AWS::Region}"
          IndexArn: !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/${AppName}-vectors-${AWS::AccountId}-${AWS::Region}/index/${AppName}-index"

  # --- Data Source ---
  DataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !Ref KnowledgeBase
      Name: !Sub "${AppName}-s3"
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt DocumentsBucket.Arn
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 1000
            OverlapPercentage: 20

Outputs:
  KnowledgeBaseId:
    Value: !GetAtt KnowledgeBase.KnowledgeBaseId
  DataSourceId:
    Value: !GetAtt DataSource.DataSourceId
  DocumentsBucketName:
    Value: !Ref DocumentsBucket
